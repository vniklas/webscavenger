name: Weekly menu scrape

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC (adjust as needed)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scrapers
        run: |
          python run_all.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: menus
          path: output/

      - name: Commit output back to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "chore(menus): update generated menus $(date -u +'%Y-%m-%d') [ci skip]" && git push)
